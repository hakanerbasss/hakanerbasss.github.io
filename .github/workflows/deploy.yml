name: Kripto Bot Deploy

on:
  push:
    branches: [main]
    paths:
      - 'kripto-bot/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Sunucuya deploy et
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/hakanerbasss.github.io
            git pull origin main
            cp -r kripto-bot/app.py kripto-bot/bot.py kripto-bot/seans_strategy.py kripto-bot/signal_engine.py kripto-bot/telegram_bot.py ~/kripto-bot/
            cp -r kripto-bot/templates ~/kripto-bot/
            cp -r kripto-bot/static ~/kripto-bot/
            cd ~/kripto-bot
            source venv/bin/activate
            systemctl restart kripto-bot
            systemctl status kripto-bot --no-pager
