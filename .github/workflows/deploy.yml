name: Kripto Bot Deploy

on:
  push:
    branches: [main]
    paths:
      - 'kripto-bot/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Sunucuya deploy et
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/hakanerbasss.github.io
            git fetch origin main
            git reset --hard origin/main
            cp kripto-bot/app.py ~/kripto-bot/
            cp kripto-bot/bot.py ~/kripto-bot/
            cp kripto-bot/signal_engine.py ~/kripto-bot/
            cp kripto-bot/autonomous_agent.py ~/kripto-bot/ 2>/dev/null || true
            cp kripto-bot/edge_agent.py ~/kripto-bot/ 2>/dev/null || true
            cp kripto-bot/indicator_agent.py ~/kripto-bot/ 2>/dev/null || true
            cp kripto-bot/seans_strategy.py ~/kripto-bot/ 2>/dev/null || true
            cp kripto-bot/smart_strategy.py ~/kripto-bot/ 2>/dev/null || true
            cp kripto-bot/telegram_bot.py ~/kripto-bot/ 2>/dev/null || true
            cp -r kripto-bot/templates ~/kripto-bot/
            cp -r kripto-bot/static ~/kripto-bot/ 2>/dev/null || true
            systemctl restart kripto-bot
            systemctl status kripto-bot --no-pager
