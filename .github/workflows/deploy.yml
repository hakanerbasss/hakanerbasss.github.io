name: Kripto Bot Deploy

on:
  push:
    branches: [main]
    paths:
      - 'kripto-bot/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Sunucuya deploy et
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/hakanerbasss.github.io
            git fetch origin main
            git reset --hard origin/main
            DEST=~/kripto-bot/kripto-bot
            cp kripto-bot/app.py $DEST/
            cp kripto-bot/bot.py $DEST/
            cp kripto-bot/signal_engine.py $DEST/
            cp kripto-bot/autonomous_agent.py $DEST/ 2>/dev/null || true
            cp kripto-bot/edge_agent.py $DEST/ 2>/dev/null || true
            cp kripto-bot/indicator_agent.py $DEST/ 2>/dev/null || true
            cp kripto-bot/wyckoff_agent.py $DEST/ 2>/dev/null || true
            cp kripto-bot/breakout_agent.py $DEST/ 2>/dev/null || true
            cp kripto-bot/manager_agent.py $DEST/ 2>/dev/null || true
            cp kripto-bot/funding_agent.py $DEST/ 2>/dev/null || true
            cp kripto-bot/accumulation_agent.py $DEST/ 2>/dev/null || true
            cp kripto-bot/trends_backtest.py $DEST/ 2>/dev/null || true
            cp kripto-bot/seans_strategy.py $DEST/ 2>/dev/null || true
            cp kripto-bot/smart_strategy.py $DEST/ 2>/dev/null || true
            cp kripto-bot/telegram_bot.py $DEST/ 2>/dev/null || true
            cp -r kripto-bot/templates $DEST/
            cp -r kripto-bot/static $DEST/ 2>/dev/null || true
            find $DEST -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
            systemctl restart kripto-bot
            systemctl status kripto-bot --no-pager
