<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kripto Bot — Giriş</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f5f5;font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.box{background:#fff;border-radius:12px;padding:40px;width:340px;box-shadow:0 2px 20px rgba(0,0,0,0.1);}
h1{text-align:center;margin-bottom:8px;font-size:20px;color:#1a1a1a;}
p.sub{text-align:center;color:#888;font-size:13px;margin-bottom:28px;}
label{display:block;font-size:13px;color:#444;margin-bottom:6px;}
input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:16px;outline:none;}
input:focus{border-color:#f0a500;}
button{width:100%;padding:12px;background:#f0a500;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;}
button:hover{background:#d4940a;}
.error{background:#fee;color:#c00;padding:10px;border-radius:8px;font-size:13px;margin-bottom:16px;text-align:center;}
</style>
</head>
<body>
<div class="box">
  <h1>🤖 Kripto Bot</h1>
  <p class="sub">Yönetim Paneli</p>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label>Kullanıcı Adı</label>
    <input type="text" name="username" placeholder="admin" required>
    <label>Şifre</label>
    <input type="password" name="password" placeholder="••••••••" required>
    <button type="submit">Giriş Yap</button>
  </form>
</div>
</body>
</html>
